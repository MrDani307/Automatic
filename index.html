<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control</title>
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(25, 25, 25, 0.7);
            --accent: #bb86fc;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea, select {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 28px;
            width: 90%;
            max-width: 360px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin: 20px 0;
        }

        h2 {
            text-align: center;
            font-weight: 200;
            font-size: 20px;
            margin: 0 0 25px;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .field-group { margin-bottom: 16px; }

        label {
            display: block;
            margin: 0 0 6px 6px;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, textarea, input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:focus, textarea:focus, input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
        }

        select option {
            color: #000;
            background: #fff;
        }

        textarea { height: 120px; resize: none; }

        /* Переключатель режима */
        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .mode-toggle button {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: #666;
            border: none;
            border-radius: 0;
            margin: 0;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle button.active {
            background: var(--accent);
            color: #000;
        }

        .mode-toggle button:active {
            transform: none;
            opacity: 1;
        }

        button#go {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 18px;
            margin-top: 10px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button#go:active { transform: scale(0.96); opacity: 0.8; }
        button#go:disabled { background: #222; color: #444; }

        .status {
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
            padding: 12px;
            border-radius: 14px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .missed-list {
            margin-top: 10px;
            font-size: 11px;
            color: #ff8a80;
            text-align: left;
            background: rgba(213, 0, 0, 0.05);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 138, 128, 0.2);
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }

        .hint {
            font-size: 10px;
            color: #555;
            margin: 4px 0 0 6px;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .success { color: #b9f6ca; background: rgba(0, 200, 83, 0.1); }
        .error { color: #ff8a80; background: rgba(213, 0, 0, 0.1); }
    </style>
</head>
<body>

<div class="card">
    <h2>COMMAND</h2>

    <div class="field-group">
        <label>Объект</label>
        <select id="target">
            <option value="gymnasium">Гимназия</option>
            <option value="rainbow">Радуга</option>
            <option value="creek">Ручеёк</option>
            <option value="cheburashka">Чебурашка</option>
            <option value="elegant">Элегант</option>
            <option value="anchor">Якорёк</option>
            <option value="corp1">36 корпус 1</option>
            <option value="corp2">36 корпус 2</option>
            <option value="berezka">Березка</option>
            <option value="elegant_tournaments">Турниры Элегант</option>
            <option value="test">Тест</option>
        </select>
    </div>

    <!-- Переключатель режима -->
    <label style="margin-bottom:8px;">Режим поиска столбца</label>
    <div class="mode-toggle">
        <button id="modeCol" class="active" onclick="setMode('col')">По столбцу</button>
        <button id="modeNum" onclick="setMode('num')">По числу</button>
    </div>

    <!-- Режим: столбец -->
    <div id="blockCol" style="display: flex; gap: 10px;">
        <div class="field-group" style="flex: 1;">
            <label>Столбец</label>
            <input type="text" id="col" value="B">
        </div>
        <div class="field-group" style="flex: 1;">
            <label>Символ</label>
            <input type="text" id="val" value="1">
        </div>
    </div>

    <!-- Режим: по числу -->
    <div id="blockNum" style="display: none;">
        <div style="display: flex; gap: 10px;">
            <div class="field-group" style="flex: 1;">
                <label>Число в шапке</label>
                <input type="number" id="headerNum" value="1" min="1">
                <div class="hint">Ищет с столбца F (пропускает A–E)</div>
            </div>
            <div class="field-group" style="flex: 1;">
                <label>Символ</label>
                <input type="text" id="val2" value="1">
            </div>
        </div>
    </div>

    <div class="field-group">
        <label>Список (Фамилия Имя)</label>
        <textarea id="names" placeholder="Иванов Иван&#10;Петров Петр..."></textarea>
    </div>

    <button id="go">Запустить</button>
    
    <div id="status" class="status"></div>
    <div id="missedBox" class="missed-list"></div>
</div>

<script>
    const MACROS = {
        gymnasium: "https://script.google.com/macros/s/AKfycbwk5cGmz-tr-JVF1XI0PIHG8S0Mp99DYWYdt-8Ks1PqG9NHY68Wx0V_aQLb8pTtWS29/exec",
        rainbow: "https://script.google.com/macros/s/AKfycbzlG0mNL6ZpH_eqRLsqx2YfSFktMQdzKlDrbRkEj_J2s3-QDEIxYViKvtXm4f9YXydm/exec",
        creek: "https://script.google.com/macros/s/AKfycbxSeqyOmk2ZsZ7y6rFsqGu69QubseSHK6HwwjiSa0h_ah41_SWEDc5c8IGCHUyT0fBepw/exec",
        cheburashka: "https://script.google.com/macros/s/AKfycbzo_7FS8VbXYHlK0WBR_MePaO2f2WfgLAbWa88Ukk2x02ftlCTBk5YVkiReZuezYRR8/exec",
        elegant: "https://script.google.com/macros/s/AKfycbx3VrUHM6xj-6-25FnN5N6IKpW6CcQ9msP5Wt2p49a0eTGO11OJOZp2JQEVyv1a4O1a5w/exec",
        anchor: "https://script.google.com/macros/s/AKfycbyEbjA0YbAeEgaBLVKLvV3YgKzVkwDGbph93ApQCYm2IBbmZ0U_3d3hrYxPRJz2kYMUog/exec",
        corp1: "https://script.google.com/macros/s/AKfycbwM4fhmvJHJKpznXUeOZWUvYYzIm5QRNWNAoBopLLwDlATnXcuNjDPDnSlkzpoGa_XL/exec",
        corp2: "https://script.google.com/macros/s/AKfycbzcuVvdZYYPNykgJO77PUjdA_r5RiYa1Rw4TB3Nhh4tjIJFdm4eStmmcORob160Odzz/exec",
        berezka: "https://script.google.com/macros/s/AKfycbzDOjIpIyatrsNDpbisFFNCVtYchgflY9CuCB5cNsQ1bpaNJDyhfS_hrfbAXrU_qmKg/exec",
        elegant_tournaments: "https://script.google.com/macros/s/AKfycbyG_tYIDweUnae_kgYLfBOzO0zjMjissAbCevR-A_Matyds3PECwIm7N3K3YUnV71uJEQ/exec",
        test: "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec"
    };

    let currentMode = 'col';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('blockCol').style.display = mode === 'col' ? 'flex' : 'none';
        document.getElementById('blockNum').style.display = mode === 'num' ? 'block' : 'none';
        document.getElementById('modeCol').classList.toggle('active', mode === 'col');
        document.getElementById('modeNum').classList.toggle('active', mode === 'num');
    }

    // Перевод номера столбца в букву (1=A, 6=F ...)
    function columnToLetter(col) {
        let letter = '';
        while (col > 0) {
            let rem = (col - 1) % 26;
            letter = String.fromCharCode(65 + rem) + letter;
            col = Math.floor((col - 1) / 26);
        }
        return letter;
    }

    const btn = document.getElementById('go');
    const status = document.getElementById('status');
    const missedBox = document.getElementById('missedBox');

    btn.onclick = async () => {
        const macroUrl = MACROS[document.getElementById('target').value];
        const namesInput = document.getElementById('names');
        const names = namesInput.value;

        if (!names.trim()) {
            showStatus('Вставь имена!', 'error');
            return;
        }

        let col, val;

        if (currentMode === 'col') {
            col = document.getElementById('col').value.trim();
            val = document.getElementById('val').value;
        } else {
            // Режим поиска по числу в шапке
            const headerNum = parseInt(document.getElementById('headerNum').value);
            val = document.getElementById('val2').value;

            if (!headerNum || headerNum < 1) {
                showStatus('Введи число для поиска!', 'error');
                return;
            }

            // Запрашиваем шапку таблицы через отдельный запрос
            btn.disabled = true;
            btn.innerText = 'Ищу столбец...';

            try {
                // Передаём специальный параметр findCol — скрипт вернёт номер столбца
                const findUrl = `${macroUrl}?findCol=${encodeURIComponent(headerNum)}`;
                const findResp = await fetch(findUrl);
                const findData = await findResp.json();

                if (findData.colLetter) {
                    col = findData.colLetter;
                    showStatus(`Столбец найден: ${col}`, 'success');
                } else if (findData.error) {
                    showStatus('Ошибка поиска столбца: ' + findData.error, 'error');
                    btn.disabled = false;
                    btn.innerText = 'Запустить';
                    return;
                } else {
                    showStatus(`Число ${headerNum} не найдено в шапке (столбцы F+)`, 'error');
                    btn.disabled = false;
                    btn.innerText = 'Запустить';
                    return;
                }
            } catch (e) {
                showStatus('Ошибка (проверь VPN)', 'error');
                btn.disabled = false;
                btn.innerText = 'Запустить';
                return;
            }
        }

        btn.disabled = true;
        btn.innerText = 'Синхронизация...';
        status.style.display = 'none';
        missedBox.style.display = 'none';

        try {
            const finalUrl = `${macroUrl}?searchName=${encodeURIComponent(names)}&col=${encodeURIComponent(col)}&val=${encodeURIComponent(val)}`;
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.updated !== undefined) {
                showStatus(`Успех: ${data.updated} / ${data.total} (столбец ${col})`, 'success');

                if (data.missed && data.missed.length > 0) {
                    missedBox.innerHTML = `<strong>Не найдены:</strong><br>${data.missed.join('<br>')}`;
                    missedBox.style.display = 'block';
                }

                if (data.updated === data.total) {
                    namesInput.value = '';
                }
            } else {
                showStatus('Ошибка ответа', 'error');
            }
        } catch (err) {
            showStatus('Ошибка (проверь VPN)', 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Запустить';
        }
    };

    function showStatus(text, type) {
        status.innerText = text;
        status.className = 'status ' + type;
        status.style.display = 'block';
    }
</script>

</body>
</html>
