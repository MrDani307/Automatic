<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центр Управления</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #444; font-size: 13px; }
        select, textarea, input, button { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #dcdcdc; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        textarea { height: 120px; resize: none; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #ccc; }
        .status { padding: 15px; border-radius: 12px; display: none; margin-top: 15px; font-size: 14px; white-space: pre-wrap; line-height: 1.4; border: 1px solid transparent; }
        .success { background: #e6f4ea; color: #1e8e3e; border-color: #ceead6; }
        .error { background: #fce8e6; color: #d93025; border-color: #fad2cf; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Табличный Центр</h2>

    <label>🎯 Выберите макрос (скрипт):</label>
    <select id="tableSelect">
        <option value="https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec">Тестовая таблица</option>
        <option value="https://script.google.com/macros/s/AKfycbzDOjIpIyatrsNDpbisFFNCVtYchgflY9CuCB5cNsQ1bpaNJDyhfS_hrfbAXrU_qmKg/exec">Березка</option>
    </select>

    <label>🔗 Ссылка на лист (с gid):</label>
    <input type="text" id="sheetUrl" value="https://docs.google.com/spreadsheets/d/1e6uk3LObdup1tZmVYiUI35zrs_KvRjQkOo5o7mHmirM/edit#gid=1435487189">

    <label>📊 Столбец:</label>
    <input type="text" id="columnLetter" value="B">

    <label>✍️ Значение:</label>
    <input type="text" id="valueToSet" value="1">

    <label>👥 Список имен:</label>
    <textarea id="namesInput" placeholder="Имена через Enter..."></textarea>

    <button id="sendBtn">ОБРАБОТАТЬ</button>
    <div id="statusBox" class="status"></div>
</div>

<script>
    const btn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('statusBox');

    btn.onclick = async () => {
        const scriptUrl = document.getElementById('tableSelect').value;
        const sheetUrl = document.getElementById('sheetUrl').value.trim();
        const names = document.getElementById('namesInput').value;
        const col = document.getElementById('columnLetter').value.trim();
        const val = document.getElementById('valueToSet').value;

        if (!names.trim() || !col || !sheetUrl) {
            showStatus('⚠️ Заполни все поля!', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerText = '⏳ Соединение...';
        statusBox.style.display = 'none';

        try {
            // Отправляем полную ссылку в скрипт
            const finalUrl = `${scriptUrl}?searchName=${encodeURIComponent(names)}&col=${encodeURIComponent(col)}&val=${encodeURIComponent(val)}&sheetUrl=${encodeURIComponent(sheetUrl)}`;
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.updated !== undefined) {
                showStatus(`✅ Готово!\nЛист: ${data.usedSheet}\nОбновлено: ${data.updated} из ${data.total}`, 'success');
                if (data.updated > 0) document.getElementById('namesInput').value = '';
            } else {
                showStatus('❌ Ошибка: ' + (data.error || 'неизвестно'), 'error');
            }
        } catch (err) {
            showStatus('❌ Ошибка сети! Проверь VPN и доступ скрипта.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = 'ОБРАБОТАТЬ';
        }
    };

    function showStatus(text, type) {
        statusBox.innerText = text;
        statusBox.className = 'status ' + type;
        statusBox.style.display = 'block';
    }
</script>

</body>
</html>
