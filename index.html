<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body{font-family:sans-serif;padding:15px;background:#f9f9f9}
    input{width:100%;padding:8px;margin:5px 0 15px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px}
    button{width:100%;padding:10px;background:#4285f4;color:#fff;border:none;border-radius:4px;cursor:pointer}
    button:hover{background:#357ae8}
  </style>
</head>
<body>
  <label>Номер столбца (1, 2, 3...):</label>
  <input type="number" id="col" placeholder="Например: 1">
  <label>Данные для ввода:</label>
  <input type="text" id="val" placeholder="Текст или число">
  <button onclick="send()">Отправить</button>

  <script>
    function send(){
      var d = {col: document.getElementById('col').value, val: document.getElementById('val').value};
      google.script.run.withSuccessHandler(res => {
        alert(res);
        if(res.indexOf('Ок') !== -1) google.script.host.close();
      }).processForm(d);
    }
  </script>
</body>
</html>
