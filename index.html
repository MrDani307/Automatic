<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Editor</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #0f0c29; 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 25px; 
            width: 85%; 
            max-width: 340px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            text-align: center; 
            color: white; 
        }

        h2 { font-weight: 300; margin-bottom: 20px; letter-spacing: 2px; color: #00d2ff; }

        .input-group { text-align: left; margin-bottom: 12px; }
        
        label { font-size: 10px; text-transform: uppercase; opacity: 0.5; margin-left: 10px; }

        input, textarea { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; 
            padding: 14px; 
            color: white; 
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none; 
            margin-top: 5px; 
            transition: 0.3s;
        }

        textarea { height: 120px; resize: none; }

        input:focus, textarea:focus { border-color: #00d2ff; background: rgba(255, 255, 255, 0.1); }

        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            color: white; 
            font-size: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            margin-top: 10px; 
        }

        button:active { transform: scale(0.97); }

        #status { margin-top: 15px; font-size: 12px; color: #00d2ff; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Mass Editor</h2>
    
    <div class="input-group">
        <label>Список (каждый человек с новой строки)</label>
        <textarea id="searchNames" placeholder="Глеб Сергеевич&#10;Артем&#10;Максим Иванов"></textarea>
    </div>

    <div class="input-group">
        <label>Столбец (буква)</label>
        <input type="text" id="colLetter" placeholder="B" maxlength="2" style="text-transform: uppercase;">
    </div>

    <div class="input-group">
        <label>Что вписать?</label>
        <input type="text" id="val" placeholder="Напр: Готово">
    </div>

    <button id="mainBtn" onclick="sendData()">Обновить данные</button>
    <div id="status">Готов</div>
</div>

<script>
    function letterToColumn(letter) {
        let column = 0, length = letter.length;
        for (let i = 0; i < length; i++) {
            column += (letter.toUpperCase().charCodeAt(i) - 64) * Math.pow(26, length - i - 1);
        }
        return column;
    }

    async function sendData() {
        // УКАЖИ СВОЮ ССЫЛКУ ТУТ:
        const url = "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec";
        
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        
        let rawInput = document.getElementById('searchNames').value;
        const letter = document.getElementById('colLetter').value.trim();
        const val = document.getElementById('val').value;

        if(!rawInput || !letter || !val) {
            status.innerText = "⚠️ Заполни все поля!";
            return;
        }

        // Превращаем каждую строку в отдельный элемент списка, разделяя их символом "|"
        // Это позволит искать "Глеб Сергеевич" как одну фразу.
        let preparedNames = rawInput
            .split('\n')
            .map(name => name.trim())
            .filter(name => name.length > 0)
            .join('|');

        const colIndex = letterToColumn(letter);
        btn.disabled = true;
        status.innerText = "⏳ Синхронизация...";

        try {
            const finalUrl = `${url}?col=${colIndex}&searchName=${encodeURIComponent(preparedNames)}&val=${encodeURIComponent(val)}`;
            
            await fetch(finalUrl, { method: 'POST', mode: 'no-cors' });

            status.innerText = "✅ Таблица обновлена!";
            document.getElementById('searchNames').value = "";
        } catch (e) {
            status.innerText = "❌ Ошибка соединения";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
