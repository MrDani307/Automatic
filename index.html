<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sheets Editor</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #121212; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; width: 85%; max-width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; color: white; }
        h2 { font-weight: 300; margin-bottom: 20px; color: #00d2ff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { text-align: left; }
        label { font-size: 10px; text-transform: uppercase; opacity: 0.6; margin-left: 5px; }
        input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; padding: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-top: 5px; }
        input:focus { border-color: #00d2ff; }
        #val { margin-bottom: 15px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #00d2ff; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #status { margin-top: 15px; font-size: 12px; height: 1.2rem; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Editor</h2>
    
    <div class="grid">
        <div class="input-group">
            <label>Столбец (A, B...)</label>
            <input type="text" id="colLetter" placeholder="B" maxlength="2" style="text-transform: uppercase;">
        </div>
        <div class="input-group">
            <label>Строка (1, 2...)</label>
            <input type="number" id="rowNumber" placeholder="5">
        </div>
    </div>

    <div class="input-group">
        <label>Данные</label>
        <input type="text" id="val" placeholder="Введите текст">
    </div>

    <button id="mainBtn" onclick="sendData()">ОБНОВИТЬ ЯЧЕЙКУ</button>
    <div id="status">Готов</div>
</div>

<script>
    function letterToColumn(letter) {
        let column = 0, length = letter.length;
        for (let i = 0; i < length; i++) {
            column += (letter.toUpperCase().charCodeAt(i) - 64) * Math.pow(26, length - i - 1);
        }
        return column;
    }

    async function sendData() {
        const url = "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec";
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        
        const letter = document.getElementById('colLetter').value.trim();
        const row = document.getElementById('rowNumber').value;
        const val = document.getElementById('val').value;

        if(!letter || !row || !val) {
            status.innerText = "⚠️ Заполни все поля!";
            return;
        }

        const colIndex = letterToColumn(letter);
        btn.disabled = true;
        status.innerText = "⏳ Сохранение...";

        try {
            // Отправляем и колонку, и строку
            const finalUrl = `${url}?col=${colIndex}&row=${row}&val=${encodeURIComponent(val)}`;
            
            await fetch(finalUrl, { method: 'POST', mode: 'no-cors' });

            status.innerText = `✅ Записано в ${letter.toUpperCase()}${row}`;
            document.getElementById('val').value = "";
        } catch (e) {
            status.innerText = "❌ Ошибка сети";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
