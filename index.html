<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Editor Pro</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: #0b0e14; font-family: 'Segoe UI', sans-serif; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); 
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 30px; width: 90%; max-width: 350px; text-align: center; color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h2 { font-weight: 300; margin-bottom: 20px; color: #00d2ff; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; text-transform: uppercase; opacity: 0.5; margin-left: 5px; }
        input, textarea { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 15px; color: white; font-size: 16px; 
            box-sizing: border-box; outline: none; margin-top: 5px;
        }
        textarea { height: 150px; resize: none; }
        button { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            background: #00d2ff; color: #000; font-size: 14px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px;
        }
        button:active { transform: scale(0.97); }
        #status { margin-top: 15px; font-size: 12px; color: #00d2ff; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Mass Editor</h2>
    
    <div class="input-group">
        <label>Вставь сплошной список (Имя Фамилия)</label>
        <textarea id="searchNames" placeholder="Глеб Сергеевич Артем Иванов Максим Петров"></textarea>
    </div>

    <div class="input-group">
        <label>Буква столбца</label>
        <input type="text" id="colLetter" placeholder="B" maxlength="2" style="text-transform: uppercase;">
    </div>

    <div class="input-group">
        <label>Что вписать?</label>
        <input type="text" id="val" placeholder="Напр: Оплачено">
    </div>

    <button id="mainBtn" onclick="sendData()">ОБРАБОТАТЬ СПИСОК</button>
    <div id="status">Готов</div>
</div>

<script>
    function letterToColumn(letter) {
        let column = 0, length = letter.length;
        for (let i = 0; i < length; i++) {
            column += (letter.toUpperCase().charCodeAt(i) - 64) * Math.pow(26, length - i - 1);
        }
        return column;
    }

    async function sendData() {
        // ЗАМЕНИ НА СВОЮ ССЫЛКУ:
        const url = "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec";
        
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        
        const rawText = document.getElementById('searchNames').value;
        const letter = document.getElementById('colLetter').value.trim();
        const val = document.getElementById('val').value;

        if(!rawText || !letter || !val) {
            status.innerText = "⚠️ Заполни все поля!";
            return;
        }

        const colIndex = letterToColumn(letter);
        btn.disabled = true;
        status.innerText = "⏳ Идет поиск...";

        try {
            const finalUrl = `${url}?col=${colIndex}&searchName=${encodeURIComponent(rawText)}&val=${encodeURIComponent(val)}`;
            
            await fetch(finalUrl, { method: 'POST', mode: 'no-cors' });

            status.innerText = "✅ Все найденные обновлены!";
            document.getElementById('searchNames').value = "";
        } catch (e) {
            status.innerText = "❌ Ошибка сети";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
