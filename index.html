<body>

<div class="card">
    <h2>COMMAND</h2>

    <div class="field-group">
        <label>Объекты</label>
        <div class="targets-grid" id="targetsGrid"></div>
        <button class="select-all-btn" onclick="toggleAll()">Выбрать все / Снять</button>
    </div>

    <label style="margin-bottom:8px;">Режим поиска столбца</label>
    <div class="mode-toggle">
        <button id="modeCol" class="active" onclick="setMode('col')">По столбцу</button>
        <button id="modeNum" onclick="setMode('num')">По числу</button>
    </div>

    <div id="blockCol" style="display: flex; gap: 10px;">
        <div class="field-group" style="flex: 1;">
            <label>Столбец</label>
            <input type="text" id="col" value="B">
        </div>
        <div class="field-group" style="flex: 1;">
            <label>Символ</label>
            <input type="text" id="val" value="1">
        </div>
    </div>

    <div id="blockNum" style="display: none;">
        <div style="display: flex; gap: 10px;">
            <div class="field-group" style="flex: 1;">
                <label>Число в шапке</label>
                <input type="number" id="headerNum" value="1" min="1">
                <div class="hint">Ищет с столбца F (пропускает A-E)</div>
            </div>
            <div class="field-group" style="flex: 1;">
                <label>Символ</label>
                <input type="text" id="val2" value="1">
            </div>
        </div>
    </div>

    <div class="field-group">
        <div class="names-header">
            <label>Список (Фамилия Имя)</label>
            <label class="auto-label">
                <input type="checkbox" id="autoDetect">
                <span>Авто</span>
            </label>
        </div>
        <div class="auto-detected" id="autoDetected"></div>
        <textarea id="names" placeholder="Иванов Иван&#10;Петров Петр..."></textarea>
    </div>

    <button id="go">Запустить</button>

    <div id="status" class="status"></div>
    <div id="resultsBox" class="results-box"></div>
</div>

<script>
    var MACROS = {
        gymnasium:           { label: "Гимназия",        url: "https://script.google.com/macros/s/AKfycbwk5cGmz-tr-JVF1XI0PIHG8S0Mp99DYWYdt-8Ks1PqG9NHY68Wx0V_aQLb8pTtWS29/exec" },
        rainbow:             { label: "Радуга",           url: "https://script.google.com/macros/s/AKfycbzlG0mNL6ZpH_eqRLsqx2YfSFktMQdzKlDrbRkEj_J2s3-QDEIxYViKvtXm4f9YXydm/exec" },
        creek:               { label: "Ручеёк",           url: "https://script.google.com/macros/s/AKfycbxSeqyOmk2ZsZ7y6rFsqGu69QubseSHK6HwwjiSa0h_ah41_SWEDc5c8IGCHUyT0fBepw/exec" },
        cheburashka:         { label: "Чебурашка",        url: "https://script.google.com/macros/s/AKfycbzo_7FS8VbXYHlK0WBR_MePaO2f2WfgLAbWa88Ukk2x02ftlCTBk5YVkiReZuezYRR8/exec" },
        elegant:             { label: "Элегант",          url: "https://script.google.com/macros/s/AKfycbx3VrUHM6xj-6-25FnN5N6IKpW6CcQ9msP5Wt2p49a0eTGO11OJOZp2JQEVyv1a4O1a5w/exec" },
        anchor:              { label: "Якорёк",           url: "https://script.google.com/macros/s/AKfycbyEbjA0YbAeEgaBLVKLvV3YgKzVkwDGbph93ApQCYm2IBbmZ0U_3d3hrYxPRJz2kYMUog/exec" },
        corp1:               { label: "36 корпус 1",      url: "https://script.google.com/macros/s/AKfycbwM4fhmvJHJKpznXUeOZWUvYYzIm5QRNWNAoBopLLwDlATnXcuNjDPDnSlkzpoGa_XL/exec" },
        corp2:               { label: "36 корпус 2",      url: "https://script.google.com/macros/s/AKfycbzcuVvdZYYPNykgJO77PUjdA_r5RiYa1Rw4TB3Nhh4tjIJFdm4eStmmcORob160Odzz/exec" },
        berezka:             { label: "Березка",          url: "https://script.google.com/macros/s/AKfycbzDOjIpIyatrsNDpbisFFNCVtYchgflY9CuCB5cNsQ1bpaNJDyhfS_hrfbAXrU_qmKg/exec" },
        elegant_tournaments: { label: "Турниры Элегант", url: "https://script.google.com/macros/s/AKfycbyG_tYIDweUnae_kgYLfBOzO0zjMjissAbCevR-A_Matyds3PECwIm7N3K3YUnV71uJEQ/exec" },
        test:                { label: "Тест",             url: "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec" }
    };

    function detectTarget(text) {
        var lines = text.split('\n').slice(0, 5);
        var haystack = lines.join(' ').toLowerCase().replace(/ё/g, 'е');
        var has36 = haystack.indexOf('36') !== -1;
        if (has36) {
            if (/корпус\s*1|1\s*корпус/.test(haystack)) return 'corp1';
            if (/корпус\s*2|2\s*корпус/.test(haystack)) return 'corp2';
        }
        if (haystack.indexOf('якорек') !== -1 || haystack.indexOf('якорь') !== -1) return 'anchor';
        if (haystack.indexOf('гимназия') !== -1 || haystack.indexOf('гимназии') !== -1) return 'gymnasium';
        if (haystack.indexOf('радуга') !== -1 || haystack.indexOf('радуги') !== -1) return 'rainbow';
        if (haystack.indexOf('ручеек') !== -1 || haystack.indexOf('ручей') !== -1) return 'creek';
        if (haystack.indexOf('чебурашка') !== -1 || haystack.indexOf('чебурашки') !== -1) return 'cheburashka';
        if (haystack.indexOf('элегант') !== -1) return 'elegant';
        if (haystack.indexOf('березка') !== -1 || haystack.indexOf('березки') !== -1) return 'berezka';
        if (haystack.indexOf('турнир') !== -1) return 'elegant_tournaments';
        return null;
    }

    var grid = document.getElementById('targetsGrid');
    Object.keys(MACROS).forEach(function(key) {
        var obj = MACROS[key];
        var chip = document.createElement('div');
        chip.className = 'target-chip';
        chip.textContent = obj.label;
        chip.dataset.key = key;
        chip.onclick = function() { chip.classList.toggle('selected'); };
        grid.appendChild(chip);
    });

    function toggleAll() {
        var chips = document.querySelectorAll('.target-chip');
        var allSelected = true;
        chips.forEach(function(c) { if (!c.classList.contains('selected')) allSelected = false; });
        chips.forEach(function(c) { allSelected ? c.classList.remove('selected') : c.classList.add('selected'); });
    }

    function getSelected() {
        return Array.from(document.querySelectorAll('.target-chip.selected')).map(function(c) { return c.dataset.key; });
    }

    function selectOnly(key) {
        document.querySelectorAll('.target-chip').forEach(function(c) {
            c.classList.toggle('selected', c.dataset.key === key);
        });
    }

    var namesEl = document.getElementById('names');
    var autoDetectEl = document.getElementById('autoDetect');
    var autoDetectedEl = document.getElementById('autoDetected');

    namesEl.addEventListener('input', function() {
        if (!autoDetectEl.checked) return;
        var found = detectTarget(namesEl.value);
        if (found) {
            selectOnly(found);
            autoDetectedEl.textContent = 'Найдено: ' + MACROS[found].label;
            autoDetectedEl.style.display = 'block';
        } else {
            autoDetectedEl.textContent = 'Объект не распознан';
            autoDetectedEl.style.display = 'block';
        }
    });

    autoDetectEl.addEventListener('change', function() {
        if (!autoDetectEl.checked) {
            autoDetectedEl.style.display = 'none';
        } else if (namesEl.value.trim()) {
            namesEl.dispatchEvent(new Event('input'));
        }
    });

    var currentMode = 'col';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('blockCol').style.display = mode === 'col' ? 'flex' : 'none';
        document.getElementById('blockNum').style.display = mode === 'num' ? 'block' : 'none';
        document.getElementById('modeCol').classList.toggle('active', mode === 'col');
        document.getElementById('modeNum').classList.toggle('active', mode === 'num');
    }

    var btn = document.getElementById('go');
    var statusEl = document.getElementById('status');
    var resultsBox = document.getElementById('resultsBox');

    btn.onclick = async function() {
        var selected = getSelected();
        if (selected.length === 0) { showStatus('Выбери хотя бы один объект!', 'error'); return; }

        var namesInput = document.getElementById('names');
        var names = namesInput.value;
        if (!names.trim()) { showStatus('Вставь имена!', 'error'); return; }

        var val = currentMode === 'col'
            ? document.getElementById('val').value
            : document.getElementById('val2').value;

        var colFixed = currentMode === 'col'
            ? document.getElementById('col').value.trim()
            : null;

        var headerNum = currentMode === 'num'
            ? parseInt(document.getElementById('headerNum').value)
            : null;

        if (currentMode === 'num' && (!headerNum || headerNum < 1)) {
            showStatus('Введи число для поиска!', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Отправляю (0/' + selected.length + ')...';
        statusEl.style.display = 'none';
        resultsBox.style.display = 'block';
        resultsBox.innerHTML = '';

        var done = 0;
        var allSuccess = true;

        var promises = selected.map(async function(key) {
            var macroUrl = MACROS[key].url;
            var label = MACROS[key].label;

            var item = document.createElement('div');
            item.className = 'result-item loading';
            item.innerHTML = '<div class="obj-name">... ' + label + '</div>Отправляю...';
            resultsBox.appendChild(item);

            try {
                var colToUse = colFixed;

                if (currentMode === 'num') {
                    var findResp = await fetch(macroUrl + '?findCol=' + encodeURIComponent(headerNum));
                    var findData = await findResp.json();
                    if (findData.colLetter) {
                        colToUse = findData.colLetter;
                    } else {
                        done++;
                        btn.innerText = 'Отправляю (' + done + '/' + selected.length + ')...';
                        allSuccess = false;
                        item.className = 'result-item error';
                        item.innerHTML = '<div class="obj-name">X ' + label + '</div>Число не найдено в шапке';
                        return;
                    }
                }

                var finalUrl = macroUrl + '?searchName=' + encodeURIComponent(names) + '&col=' + encodeURIComponent(colToUse) + '&val=' + encodeURIComponent(val);
                var resp = await fetch(finalUrl);
                var data = await resp.json();

                done++;
                btn.innerText = 'Отправляю (' + done + '/' + selected.length + ')...';

                var colInfo = colToUse ? ' (столбец ' + colToUse + ')' : '';

                if (data.error) {
                    allSuccess = false;
                    item.className = 'result-item error';
                    item.innerHTML = '<div class="obj-name">X ' + label + '</div>Ошибка: ' + data.error;
                } else if (data.updated === data.total) {
                    item.className = 'result-item success';
                    item.innerHTML = '<div class="obj-name">OK ' + label + '</div>Найдено: ' + data.updated + ' / ' + data.total + colInfo;
                } else {
                    allSuccess = false;
                    var missedHtml = (data.missed && data.missed.length > 0)
                        ? '<div class="missed-names">Не найдены: ' + data.missed.join(', ') + '</div>' : '';
                    item.className = 'result-item partial';
                    item.innerHTML = '<div class="obj-name">! ' + label + '</div>Найдено: ' + data.updated + ' / ' + data.total + colInfo + missedHtml;
                }

            } catch (err) {
                done++;
                btn.innerText = 'Отправляю (' + done + '/' + selected.length + ')...';
                allSuccess = false;
                item.className = 'result-item error';
                item.innerHTML = '<div class="obj-name">X ' + label + '</div>Ошибка связи';
            }
        });

        await Promise.all(promises);

        var items = Array.from(resultsBox.querySelectorAll('.result-item'));
        items.sort(function(a, b) {
            var getCount = function(el) {
                var match = el.innerHTML.match(/(\d+)\s*\/\s*\d+/);
                return match ? parseInt(match[1]) : -1;
            };
            return getCount(b) - getCount(a);
        });
        items.forEach(function(item) { resultsBox.appendChild(item); });

        btn.disabled = false;
        btn.innerText = 'Запустить';

        if (allSuccess) namesInput.value = '';
    };

    function showStatus(text, type) {
        statusEl.innerText = text;
        statusEl.className = 'status ' + type;
        statusEl.style.display = 'block';
    }
</script>

</body>
</html>
