<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control</title>
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(25, 25, 25, 0.7);
            --accent: #bb86fc;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea, select {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 28px;
            width: 90%;
            max-width: 380px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin: 20px 0;
        }

        h2 {
            text-align: center;
            font-weight: 200;
            font-size: 20px;
            margin: 0 0 25px;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .field-group { margin-bottom: 16px; }

        label {
            display: block;
            margin: 0 0 6px 6px;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, textarea, input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select:focus, textarea:focus, input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
        }

        select option {
            color: #000;
            background: #fff;
        }

        textarea { height: 120px; resize: none; }

        .targets-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .target-chip {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #666;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-user-select: none;
            user-select: none;
        }

        .target-chip.selected {
            background: rgba(187, 134, 252, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        .select-all-btn {
            width: 100%;
            padding: 9px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 12px;
            color: #555;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .select-all-btn:active { color: var(--accent); border-color: var(--accent); }

        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .mode-toggle button {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: #666;
            border: none;
            border-radius: 0;
            margin: 0;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle button.active {
            background: var(--accent);
            color: #000;
        }

        .mode-toggle button:active { transform: none; opacity: 1; }

        button#go {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 18px;
            margin-top: 10px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button#go:active { transform: scale(0.96); opacity: 0.8; }
        button#go:disabled { background: #222; color: #444; }

        .status {
            margin-top: 20px;
            font-size: 12px;
            text-align: center;
            padding: 12px;
            border-radius: 14px;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .results-box {
            margin-top: 10px;
            display: none;
        }

        .result-item {
            font-size: 11px;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            animation: slideUp 0.3s ease;
        }

        .result-item.success {
            color: #b9f6ca;
            background: rgba(0, 200, 83, 0.08);
            border: 1px solid rgba(0, 200, 83, 0.15);
        }

        .result-item.partial {
            color: #ffe082;
            background: rgba(255, 193, 7, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.15);
        }

        .result-item.error {
            color: #ff8a80;
            background: rgba(213, 0, 0, 0.08);
            border: 1px solid rgba(255, 138, 128, 0.2);
        }

        .result-item .obj-name {
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 3px;
        }

        .result-item .missed-names {
            margin-top: 4px;
            opacity: 0.8;
            line-height: 1.6;
        }

        .hint {
            font-size: 10px;
            color: #555;
            margin: 4px 0 0 6px;
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .success { color: #b9f6ca; background: rgba(0, 200, 83, 0.1); }
        .error { color: #ff8a80; background: rgba(213, 0, 0, 0.1); }
    </style>
</head>
<body>

<div class="card">
    <h2>COMMAND</h2>

    <div class="field-group">
        <label>Объекты</label>
        <div class="targets-grid" id="targetsGrid"></div>
        <button class="select-all-btn" onclick="toggleAll()">Выбрать все / Снять</button>
    </div>

    <label style="margin-bottom:8px;">Режим поиска столбца</label>
    <div class="mode-toggle">
        <button id="modeCol" class="active" onclick="setMode('col')">По столбцу</button>
        <button id="modeNum" onclick="setMode('num')">По числу</button>
    </div>

    <div id="blockCol" style="display: flex; gap: 10px;">
        <div class="field-group" style="flex: 1;">
            <label>Столбец</label>
            <input type="text" id="col" value="B">
        </div>
        <div class="field-group" style="flex: 1;">
            <label>Символ</label>
            <input type="text" id="val" value="1">
        </div>
    </div>

    <div id="blockNum" style="display: none;">
        <div style="display: flex; gap: 10px;">
            <div class="field-group" style="flex: 1;">
                <label>Число в шапке</label>
                <input type="number" id="headerNum" value="1" min="1">
                <div class="hint">Ищет с столбца F (пропускает A–E)</div>
            </div>
            <div class="field-group" style="flex: 1;">
                <label>Символ</label>
                <input type="text" id="val2" value="1">
            </div>
        </div>
    </div>

    <div class="field-group">
        <label>Список (Фамилия Имя)</label>
        <textarea id="names" placeholder="Иванов Иван&#10;Петров Петр..."></textarea>
    </div>

    <button id="go">Запустить</button>

    <div id="status" class="status"></div>
    <div id="resultsBox" class="results-box"></div>
</div>

<script>
    const MACROS = {
        gymnasium:           { label: "Гимназия",        url: "https://script.google.com/macros/s/AKfycbwk5cGmz-tr-JVF1XI0PIHG8S0Mp99DYWYdt-8Ks1PqG9NHY68Wx0V_aQLb8pTtWS29/exec" },
        rainbow:             { label: "Радуга",           url: "https://script.google.com/macros/s/AKfycbzlG0mNL6ZpH_eqRLsqx2YfSFktMQdzKlDrbRkEj_J2s3-QDEIxYViKvtXm4f9YXydm/exec" },
        creek:               { label: "Ручеёк",           url: "https://script.google.com/macros/s/AKfycbxSeqyOmk2ZsZ7y6rFsqGu69QubseSHK6HwwjiSa0h_ah41_SWEDc5c8IGCHUyT0fBepw/exec" },
        cheburashka:         { label: "Чебурашка",        url: "https://script.google.com/macros/s/AKfycbzo_7FS8VbXYHlK0WBR_MePaO2f2WfgLAbWa88Ukk2x02ftlCTBk5YVkiReZuezYRR8/exec" },
        elegant:             { label: "Элегант",          url: "https://script.google.com/macros/s/AKfycbx3VrUHM6xj-6-25FnN5N6IKpW6CcQ9msP5Wt2p49a0eTGO11OJOZp2JQEVyv1a4O1a5w/exec" },
        anchor:              { label: "Якорёк",           url: "https://script.google.com/macros/s/AKfycbyEbjA0YbAeEgaBLVKLvV3YgKzVkwDGbph93ApQCYm2IBbmZ0U_3d3hrYxPRJz2kYMUog/exec" },
        corp1:               { label: "36 корпус 1",      url: "https://script.google.com/macros/s/AKfycbwM4fhmvJHJKpznXUeOZWUvYYzIm5QRNWNAoBopLLwDlATnXcuNjDPDnSlkzpoGa_XL/exec" },
        corp2:               { label: "36 корпус 2",      url: "https://script.google.com/macros/s/AKfycbzcuVvdZYYPNykgJO77PUjdA_r5RiYa1Rw4TB3Nhh4tjIJFdm4eStmmcORob160Odzz/exec" },
        berezka:             { label: "Березка",          url: "https://script.google.com/macros/s/AKfycbzDOjIpIyatrsNDpbisFFNCVtYchgflY9CuCB5cNsQ1bpaNJDyhfS_hrfbAXrU_qmKg/exec" },
        elegant_tournaments: { label: "Турниры Элегант", url: "https://script.google.com/macros/s/AKfycbyG_tYIDweUnae_kgYLfBOzO0zjMjissAbCevR-A_Matyds3PECwIm7N3K3YUnV71uJEQ/exec" },
        test:                { label: "Тест",             url: "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec" }
    };

    // Рендер чипов
    const grid = document.getElementById('targetsGrid');
    Object.entries(MACROS).forEach(([key, obj]) => {
        const chip = document.createElement('div');
        chip.className = 'target-chip';
        chip.textContent = obj.label;
        chip.dataset.key = key;
        chip.onclick = () => chip.classList.toggle('selected');
        grid.appendChild(chip);
    });

    function toggleAll() {
        const chips = document.querySelectorAll('.target-chip');
        const allSelected = [...chips].every(c => c.classList.contains('selected'));
        chips.forEach(c => allSelected ? c.classList.remove('selected') : c.classList.add('selected'));
    }

    function getSelected() {
        return [...document.querySelectorAll('.target-chip.selected')].map(c => c.dataset.key);
    }

    let currentMode = 'col';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('blockCol').style.display = mode === 'col' ? 'flex' : 'none';
        document.getElementById('blockNum').style.display = mode === 'num' ? 'block' : 'none';
        document.getElementById('modeCol').classList.toggle('active', mode === 'col');
        document.getElementById('modeNum').classList.toggle('active', mode === 'num');
    }

    const btn = document.getElementById('go');
    const statusEl = document.getElementById('status');
    const resultsBox = document.getElementById('resultsBox');

    btn.onclick = async () => {
        const selected = getSelected();
        if (selected.length === 0) { showStatus('Выбери хотя бы один объект!', 'error'); return; }

        const namesInput = document.getElementById('names');
        const names = namesInput.value;
        if (!names.trim()) { showStatus('Вставь имена!', 'error'); return; }

        const val = currentMode === 'col'
            ? document.getElementById('val').value
            : document.getElementById('val2').value;

        const colFixed = currentMode === 'col'
            ? document.getElementById('col').value.trim()
            : null;

        const headerNum = currentMode === 'num'
            ? parseInt(document.getElementById('headerNum').value)
            : null;

        if (currentMode === 'num' && (!headerNum || headerNum < 1)) {
            showStatus('Введи число для поиска!', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerText = `Отправляю (0/${selected.length})...`;
        statusEl.style.display = 'none';
        resultsBox.style.display = 'none';
        resultsBox.innerHTML = '';

        let done = 0;

        // Каждый объект обрабатывается независимо
        const promises = selected.map(async (key) => {
            const macroUrl = MACROS[key].url;
            const label = MACROS[key].label;
            try {
                let colToUse = colFixed;

                // Режим по числу — каждая таблица ищет свой столбец сама
                if (currentMode === 'num') {
                    const findUrl = `${macroUrl}?findCol=${encodeURIComponent(headerNum)}`;
                    const findResp = await fetch(findUrl);
                    const findData = await findResp.json();

                    if (findData.colLetter) {
                        colToUse = findData.colLetter;
                    } else {
                        done++;
                        btn.innerText = `Отправляю (${done}/${selected.length})...`;
                        return { label, key, colNotFound: true };
                    }
                }

                const finalUrl = `${macroUrl}?searchName=${encodeURIComponent(names)}&col=${encodeURIComponent(colToUse)}&val=${encodeURIComponent(val)}`;
                const resp = await fetch(finalUrl);
                const data = await resp.json();
                done++;
                btn.innerText = `Отправляю (${done}/${selected.length})...`;
                return { label, key, colToUse, data };
            } catch (err) {
                done++;
                btn.innerText = `Отправляю (${done}/${selected.length})...`;
                return { label, key, error: err.toString() };
            }
        });

        const results = await Promise.all(promises);

        // Рендер результатов
        resultsBox.style.display = 'block';

        results.forEach(({ label, colToUse, data, error, colNotFound }) => {
            const item = document.createElement('div');
            item.className = 'result-item';

            if (colNotFound) {
                item.classList.add('error');
                item.innerHTML = `<div class="obj-name">❌ ${label}</div>Число не найдено в шапке`;
            } else if (error || (data && data.error)) {
                item.classList.add('error');
                item.innerHTML = `<div class="obj-name">❌ ${label}</div>Ошибка связи`;
            } else if (data.updated === data.total) {
                const colInfo = colToUse ? ` (столбец ${colToUse})` : '';
                item.classList.add('success');
                item.innerHTML = `<div class="obj-name">✅ ${label}</div>Найдено: ${data.updated} / ${data.total}${colInfo}`;
            } else {
                const colInfo = colToUse ? ` (столбец ${colToUse})` : '';
                const missedHtml = data.missed && data.missed.length > 0
                    ? `<div class="missed-names">Не найдены: ${data.missed.join(', ')}</div>` : '';
                item.classList.add('partial');
                item.innerHTML = `<div class="obj-name">⚠️ ${label}</div>Найдено: ${data.updated} / ${data.total}${colInfo}${missedHtml}`;
            }

            resultsBox.appendChild(item);
        });

        btn.disabled = false;
        btn.innerText = 'Запустить';

        // Очищаем поле только если все успешно
        if (results.every(r => !r.error && !r.colNotFound && !r.data?.error && r.data?.updated === r.data?.total)) {
            namesInput.value = '';
        }
    };

    function showStatus(text, type) {
        statusEl.innerText = text;
        statusEl.className = 'status ' + type;
        statusEl.style.display = 'block';
    }
</script>

</body>
</html>
