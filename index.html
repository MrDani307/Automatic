<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Panel</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --accent: #bb86fc;
            --text: #ffffff;
            --field-bg: #1e1e1e;
            --border: #2c2c2c;
        }

        /* Полная блокировка синего выделения */
        * {
            -webkit-tap-highlight-color: transparent; /* Убирает синий квадрат на мобилках */
            outline: none !important; /* Убирает контур в браузерах */
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--border);
        }

        h2 {
            text-align: center;
            font-weight: 500;
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: var(--accent);
        }

        label {
            display: block;
            margin: 12px 0 6px 4px;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
        }

        select, textarea, input {
            width: 100%;
            padding: 12px;
            background: var(--field-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        select:focus, textarea:focus, input:focus {
            border-color: var(--accent);
        }

        textarea {
            height: 90px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            margin-top: 20px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #333;
            color: #555;
        }

        .status {
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }

        .success { color: #81c784; background: rgba(129, 199, 132, 0.1); }
        .error { color: #e57373; background: rgba(229, 115, 115, 0.1); }
    </style>
</head>
<body>

<div class="card">
    <h2>DASHBOARD</h2>

    <label>Объект</label>
    <select id="tableSelect">
        <option value="test">Тест</option>
        <option value="berezka">Березка</option>
    </select>

    <label>Ссылка</label>
    <input type="text" id="sheetUrl" placeholder="URL из браузера">

    <label>Столбец</label>
    <input type="text" id="columnLetter" value="B">

    <label>Символ</label>
    <input type="text" id="valueToSet" value="1">

    <label>Список</label>
    <textarea id="namesInput" placeholder="Имена..."></textarea>

    <button id="sendBtn">Запустить</button>
    <div id="statusBox" class="status"></div>
</div>

<script>
    // Ссылки спрятаны здесь
    const URLS = {
        test: "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec",
        berezka: "https://script.google.com/macros/s/AKfycbzDOjIpIyatrsNDpbisFFNCVtYchgflY9CuCB5cNsQ1bpaNJDyhfS_hrfbAXrU_qmKg/exec"
    };

    const btn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('statusBox');

    btn.onclick = async () => {
        const type = document.getElementById('tableSelect').value;
        const scriptUrl = URLS[type];
        const sheetUrl = document.getElementById('sheetUrl').value.trim();
        const names = document.getElementById('namesInput').value;
        const col = document.getElementById('columnLetter').value.trim();
        const val = document.getElementById('valueToSet').value;

        if (!names.trim() || !col || !sheetUrl) {
            showStatus('Заполни поля', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Жди...';
        statusBox.style.display = 'none';

        try {
            const finalUrl = `${scriptUrl}?searchName=${encodeURIComponent(names)}&col=${encodeURIComponent(col)}&val=${encodeURIComponent(val)}&sheetUrl=${encodeURIComponent(sheetUrl)}`;
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.updated !== undefined) {
                showStatus(`OK: ${data.updated} / ${data.total}`, 'success');
                if (data.updated > 0) document.getElementById('namesInput').value = '';
            } else {
                showStatus('Ошибка скрипта', 'error');
            }
        } catch (err) {
            showStatus('Ошибка сети', 'error');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Запустить';
        }
    };

    function showStatus(text, type) {
        statusBox.innerText = text;
        statusBox.className = 'status ' + type;
        statusBox.style.display = 'block';
    }
</script>

</body>
</html>
