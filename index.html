<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод данных в Google Таблицу</title>
    <style>
        :root {
            --primary-color: #4285f4;
            --primary-hover: #357ae8;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Google Sheets API</h2>
    
    <div class="form-group">
        <label for="col">Номер столбца (1, 2, 3...)</label>
        <input type="number" id="col" placeholder="Например: 1" min="1">
    </div>

    <div class="form-group">
        <label for="val">Данные</label>
        <input type="text" id="val" placeholder="Введите текст или число">
    </div>

    <button id="submitBtn" onclick="sendData()">Отправить в таблицу</button>
    
    <div id="status"></div>
</div>

<script>
    async function sendData() {
        // ВАША ССЫЛКА ИЗ 2-ГО ШАГА
        const scriptUrl = "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec";
        
        const colInput = document.getElementById('col');
        const valInput = document.getElementById('val');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        // Валидация
        if (!colInput.value || !valInput.value) {
            status.innerText = "⚠️ Заполните все поля!";
            status.style.color = "orange";
            return;
        }

        // Подготовка данных
        const data = {
            col: colInput.value,
            val: valInput.value
        };

        // Визуальная индикация загрузки
        btn.disabled = true;
        btn.innerText = "Отправка...";
        status.innerText = "Пожалуйста, подождите...";
        status.style.color = "blue";

        try {
            // Отправка через POST запрос
            await fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'text/plain'
                },
                body: JSON.stringify(data)
            });

            // Поскольку mode: 'no-cors', мы не получим текст ответа от Google,
            // но если fetch не упал в ошибку — значит данные ушли.
            status.innerText = "✅ Данные отправлены успешно!";
            status.style.color = "green";
            
            // Очистка поля данных (столбец оставляем для удобства)
            valInput.value = "";
            
        } catch (error) {
            console.error('Ошибка:', error);
            status.innerText = "❌ Ошибка при отправке!";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
            btn.innerText = "Отправить в таблицу";
        }
    }
</script>

</body>
</html>
