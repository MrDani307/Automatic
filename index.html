<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sheets</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); padding: 30px; width: 85%; max-width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; color: white; }
        h2 { font-weight: 300; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-left: 5px; opacity: 0.8; }
        input { width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 14px; color: white; font-size: 16px; box-sizing: border-box; outline: none; margin-top: 5px; }
        input:focus { border-color: #fff; background: rgba(255, 255, 255, 0.2); }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #fff; color: #b21f1f; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #status { margin-top: 20px; font-size: 13px; opacity: 0.9; min-height: 1.5rem; }
        .loader { display: none; margin: 10px auto; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Smart Sheet</h2>
    
    <div class="input-group">
        <label>Буква столбца (A, B, C...)</label>
        <input type="text" id="colLetter" placeholder="Напр: B" maxlength="2" style="text-transform: uppercase;">
    </div>

    <div class="input-group">
        <label>Данные</label>
        <input type="text" id="val" placeholder="Введите данные">
    </div>

    <button id="mainBtn" onclick="sendData()">ОТПРАВИТЬ</button>
    <div class="loader" id="loader"></div>
    <div id="status">Ожидание...</div>
</div>

<script>
    // Функция превращения буквы в номер (A -> 1, B -> 2...)
    function letterToColumn(letter) {
        let column = 0, length = letter.length;
        for (let i = 0; i < length; i++) {
            column += (letter.toUpperCase().charCodeAt(i) - 64) * Math.pow(26, length - i - 1);
        }
        return column;
    }

    async function sendData() {
        const url = "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec";
        
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const letter = document.getElementById('colLetter').value.trim();
        const val = document.getElementById('val').value;

        if(!letter || !val) {
            status.innerText = "⚠️ Введи букву и данные!";
            return;
        }

        const colIndex = letterToColumn(letter);
        
        btn.style.display = 'none';
        loader.style.display = 'block';
        status.innerText = "⚡ Синхронизация...";

        try {
            const finalUrl = `${url}?col=${colIndex}&val=${encodeURIComponent(val)}`;
            
            await fetch(finalUrl, {
                method: 'POST',
                mode: 'no-cors'
            });

            status.innerText = "✅ Успешно в столбец " + letter.toUpperCase();
            document.getElementById('val').value = "";
        } catch (e) {
            status.innerText = "❌ Ошибка соединения";
        } finally {
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
