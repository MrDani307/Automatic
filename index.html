<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
        }

        h2 { color: white; margin-bottom: 25px; font-weight: 300; }

        .input-group { margin-bottom: 20px; text-align: left; }

        label { color: rgba(255, 255, 255, 0.8); font-size: 12px; margin-left: 5px; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-top: 5px;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #fff;
            color: #764ba2;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:active { transform: scale(0.95); background: rgba(255,255,255,0.8); }

        #status {
            margin-top: 20px;
            font-size: 13px;
            color: #fff;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            min-height: 20px;
            word-break: break-all;
        }

        .loader {
            display: none;
            margin: 10px auto;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Smart Input</h2>
    
    <div class="input-group">
        <label>НОМЕР СТОЛБЦА</label>
        <input type="number" id="col" placeholder="Например: 1">
    </div>

    <div class="input-group">
        <label>ДАННЫЕ</label>
        <input type="text" id="val" placeholder="Введите текст">
    </div>

    <button id="mainBtn" onclick="sendData()">ОТПРАВИТЬ</button>
    <div class="loader" id="loader"></div>
    <div id="status">Готов к работе</div>
</div>

<script>
    async function sendData() {
        const url = "https://script.google.com/macros/s/AKfycbyb2FrnNQl_HWKUAwFVt7-Yv_X7rERganxUHVC9JhAUHotdOKZuFEcQUymByraPyBe2mw/exec";
        
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const col = document.getElementById('col').value;
        const val = document.getElementById('val').value;

        if(!col || !val) {
            status.innerText = "❌ Заполни все поля!";
            return;
        }

        btn.style.display = 'none';
        loader.style.display = 'block';
        status.innerText = "🚀 Отправка данных...";

        try {
            // Используем метод 'POST' с передачей параметров в URL для надежности
            const finalUrl = `${url}?col=${encodeURIComponent(col)}&val=${encodeURIComponent(val)}`;
            
            await fetch(finalUrl, {
                method: 'POST',
                mode: 'no-cors'
            });

            status.innerText = "✅ Запрос ушел! Проверь таблицу.";
            document.getElementById('val').value = "";
        } catch (e) {
            status.innerText = "⚠️ Ошибка: " + e.message;
        } finally {
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
